name: online-stats

on:
  schedule:
    - cron: '0 */6 * * *' # every 6h (00/06/12/18 UTC) — overlapping battle windows
                          # + append-only merge minimize missed matches (§4.2, §7.2)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: online-stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Refresh online stats
        run: npx tsx scripts/online-stats/index.ts
      - name: Commit if changed
        run: |
          git config user.name  "ctown-bot"
          git config user.email "ctown-bot@users.noreply.github.com"
          git add public/data/ranks.json public/data/glicko.json \
                  public/data/rankhistory.json public/data/mmrhistory.json \
                  public/data/matches.json public/data/stats.json
          if ! git diff --cached --quiet; then
            git commit -m "data: refresh online stats $(date -u +%F)"
            git push
          else
            echo "No changes."
          fi
