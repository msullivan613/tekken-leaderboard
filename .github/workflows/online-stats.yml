name: online-stats

on:
  schedule:
    - cron: '0 */6 * * *' # every 6h (00/06/12/18 UTC) — overlapping battle windows
                          # + append-only merge minimize missed matches (§4.2, §7.2)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: online-stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Refresh online stats (all sites)
        env:
          # Optional: enables group/player (custom-lobby) matches via the ewgf.gg
          # public API. Unset ⇒ the pipeline skips ewgf and behaves as before.
          EWGF_API_KEY: ${{ secrets.EWGF_API_KEY }}
        run: |
          for dir in sites/*/; do
            slug="$(basename "$dir")"
            echo "::group::$slug"
            SITE="$slug" npx tsx scripts/online-stats/index.ts
            echo "::endgroup::"
          done
      - name: Commit if changed
        run: |
          git config user.name  "ctown-bot"
          git config user.email "ctown-bot@users.noreply.github.com"
          # players.json is hand-maintained; only stage generated files.
          git add sites/*/data/ranks.json sites/*/data/glicko.json \
                  sites/*/data/rankhistory.json sites/*/data/mmrhistory.json \
                  sites/*/data/matches.json sites/*/data/stats.json
          if ! git diff --cached --quiet; then
            git commit -m "data: refresh online stats $(date -u +%F)"
            git push
          else
            echo "No changes."
          fi
