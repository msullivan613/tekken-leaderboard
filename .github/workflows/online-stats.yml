name: online-stats

on:
  schedule:
    - cron:
        '0 */6 * * *' # every 6h (00/06/12/18 UTC) — overlapping battle windows
        # + append-only merge minimize missed matches (§4.2, §7.2)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: online-stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      # Check out (and later push) via a write-enabled SSH deploy key rather than
      # the default GITHUB_TOKEN. `main` is protected by a ruleset requiring PRs +
      # the `ci` check; a user repo can't grant the generic Actions token a bypass,
      # so the bot pushes as this deploy key, which IS on the ruleset's bypass list.
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.ONLINE_STATS_SSH_KEY }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Refresh online stats (all sites)
        env:
          # Optional: enables group/player (custom-lobby) matches via the ewgf.gg
          # public API. Unset ⇒ the pipeline skips ewgf and behaves as before.
          EWGF_API_KEY: ${{ secrets.EWGF_API_KEY }}
        run: |
          for dir in sites/*/; do
            slug="$(basename "$dir")"
            echo "::group::$slug"
            SITE="$slug" npx tsx scripts/online-stats/index.ts
            echo "::endgroup::"
          done
      - name: Commit if changed
        run: |
          git config user.name  "ctown-bot"
          git config user.email "ctown-bot@users.noreply.github.com"
          # Stage every generated data file, then unstage the one hand-maintained
          # file (players.json). Staging the whole data dir (rather than an explicit
          # list) ensures cold-storage archives are committed too: matches.<year>.json
          # (#19) and rankhistory/mmrhistory.<year>.json (#10). Those archives are what
          # stats.json / the history charts are derived against, so dropping them
          # desyncs the committed data (stats reference matches not in the repo).
          git add sites/*/data/
          git reset --quiet -- sites/*/data/players.json
          if ! git diff --cached --quiet; then
            git commit -m "data: refresh online stats $(date -u +%F)"
            git push
          else
            echo "No changes."
          fi
